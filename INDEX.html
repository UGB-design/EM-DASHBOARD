<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FMS Staff Dashboard</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
margin:20px;
}

.filters{
display:flex;
gap:15px;
margin-bottom:20px;
}

select{
padding:10px;
width:250px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,.2);
}

.blue{background:#3f51b5;color:white;}
.green{background:#00a86b;color:white;}
.orange{background:#c57d16;color:white;}
.white{background:white;}

.card h1{
margin:0;
font-size:40px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th{
background:#3f51b5;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.btn{
background:#28a745;
color:white;
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="filters">

<select id="clientFilter">
<option value="">CLIENT</option>
</select>

<select id="typeFilter">
<option value="">FMS TYPE</option>
</select>

<select id="stepFilter">
<option value="">STEP</option>
</select>

</div>

<div class="cards">

<div class="card blue">
<div>MY TASKS</div>
<h1 id="myTasks">0</h1>
</div>

<div class="card green">
<div>COMPLETED</div>
<h1 id="completed">0</h1>
</div>

<div class="card orange">
<div>PENDING</div>
<h1 id="pending">0</h1>
</div>

<div class="card white">
<div>COMPLETION %</div>
<h1 id="percent">0</h1>
</div>

</div>

<table>

<thead>
<tr>
<th>STEP</th>
<th>CLIENT</th>
<th>PLANNED</th>
<th>MARK DONE</th>
</tr>
</thead>

<tbody id="taskBody">
</tbody>

</table>

<script>

// PASTE YOUR APPS SCRIPT URL HERE
const API =
"https://script.google.com/macros/s/AKfycbzoNreTHUbojwKlWXgPBzpEkbv4whjCyfVRwA-X2VKVn4pjCjyb9pjygKymmZI7z6HIjw/exec";

loadData();

async function loadData(){

const response = await fetch(API);
const data = await response.json();

document.getElementById("myTasks").innerText =
data.totalTasks || 0;

document.getElementById("completed").innerText =
data.completed || 0;

document.getElementById("pending").innerText =
data.pending || 0;

document.getElementById("percent").innerText =
(data.completionPercent || 0)+"%";

let rows="";

let clients = new Set();
let types = new Set();
let steps = new Set();

(data.tasks || []).forEach(task=>{

clients.add(task.clientName);
types.add(task.fmsType);
steps.add(task.step);

rows += `
<tr>
<td>${task.step}</td>
<td>${task.clientName}</td>
<td>${task.plannedDate}</td>
<td>
<a href="${task.formLink}" target="_blank">
<button class="btn">
Mark Done
</button>
</a>
</td>
</tr>
`;

});

document.getElementById("taskBody").innerHTML = rows;

fillDropdown("clientFilter",clients);
fillDropdown("typeFilter",types);
fillDropdown("stepFilter",steps);

}

function fillDropdown(id,data){

const select=document.getElementById(id);

data.forEach(item=>{

if(!item) return;

let option=document.createElement("option");

option.value=item;
option.text=item;

select.appendChild(option);

});

}

</script>

</body>
</html>
