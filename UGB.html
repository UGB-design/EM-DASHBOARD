<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umesh Bolmal & Associates - Dashboard Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    iframe { width: 100%; height: calc(100vh - 80px); border: none; }
  </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

  <header class="bg-[#1F5FA6] shadow-md flex flex-col md:flex-row justify-between items-center px-6 pt-4 gap-4">
    <div class="flex items-center gap-3">
      <span class="text-xl">🆛</span>
      <div>
        <h1 class="text-white font-bold text-lg leading-tight">Umesh Bolmal & Associates</h1>
        <p class="text-blue-200 text-xs tracking-wider uppercase font-semibold">Activity Portal</p>
      </div>
    </div>

    <div class="flex gap-2">
      <button id="btn-fms" onclick="switchTab('fms')" class="px-6 py-2.5 text-sm font-bold uppercase tracking-wider rounded-t-lg transition-all cursor-pointer bg-white text-[#1F5FA6] shadow">
        📄 FMS Dashboard
      </button>
      <button id="btn-checklist" onclick="switchTab('checklist')" class="px-6 py-2.5 text-sm font-bold uppercase tracking-wider rounded-t-lg transition-all cursor-pointer bg-white/10 text-white/80 hover:bg-white/20 hover:text-white">
        ✅ Checklist Dashboard
      </button>
    </div>
  </header>

  <main class="w-full relative bg-white">
    <div id="tab-fms" class="block w-full h-full">
      <iframe src="https://datastudio.google.com/embed/reporting/b8cb5428-6c70-42f2-ba91-70fc3a64da3d/page/qzoyF"></iframe>
    </div>

    <div id="tab-checklist" class="hidden w-full h-full">
      <iframe src="https://datastudio.google.com/embed/reporting/b8cb5428-6c70-42f2-ba91-70fc3a64da3d/page/p_6l2sel7q4d"></iframe>
    </div>
  </main>

  <script>
    function switchTab(tabName) {
      const fmsTab = document.getElementById('tab-fms');
      const chkTab = document.getElementById('tab-checklist');
      const fmsBtn = document.getElementById('btn-fms');
      const chkBtn = document.getElementById('btn-checklist');

      if (tabName === 'fms') {
        fmsTab.classList.remove('hidden'); fmsTab.classList.add('block');
        chkTab.classList.remove('block'); chkTab.classList.add('hidden');
        fmsBtn.className = "px-6 py-2.5 text-sm font-bold uppercase tracking-wider rounded-t-lg bg-white text-[#1F5FA6] shadow";
        chkBtn.className = "px-6 py-2.5 text-sm font-bold uppercase tracking-wider rounded-t-lg bg-white/10 text-white/80 hover:bg-white/20 hover:text-white";
      } else {
        chkTab.classList.remove('hidden'); chkTab.classList.add('block');
        fmsTab.classList.remove('block'); fmsTab.classList.add('hidden');
        chkBtn.className = "px-6 py-2.5 text-sm font-bold uppercase tracking-wider rounded-t-lg bg-white text-[#1F5FA6] shadow";
        fmsBtn.className = "px-6 py-2.5 text-sm font-bold uppercase tracking-wider rounded-t-lg bg-white/10 text-white/80 hover:bg-white/20 hover:text-white";
      }
    }
  </script>
</body>
</html>
